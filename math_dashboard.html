<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Math Quest Hall of Fame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
        }
        h1, h2, h3 {
            font-family: 'Bungee', cursive;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .glow-pink { box-shadow: 0 0 20px rgba(255, 105, 180, 0.3); }
        .glow-green { box-shadow: 0 0 20px rgba(76, 175, 80, 0.3); }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .gradient-text {
            background: linear-gradient(to right, #f472b6, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tab-btn {
            transition: all 0.2s ease;
            border-bottom: 4px solid transparent;
        }
        .tab-btn.active {
            border-bottom-color: #fbbf24;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl md:text-7xl mb-4 gradient-text">Math Quest Dashboard</h1>
            <p class="text-xl text-slate-400">Tracking the legends of the Super-Brain Universe 🚀</p>
        </header>

        <!-- Tab Navigation -->
        <div class="flex justify-center gap-4 mb-12">
            <button onclick="switchTab('kids')" id="btn-kids" class="tab-btn active px-6 py-3 rounded-t-lg text-xl font-bold text-slate-300 hover:text-white uppercase tracking-widest">
                👧👦 The Legends
            </button>
            <button onclick="switchTab('adults')" id="btn-adults" class="tab-btn px-6 py-3 rounded-t-lg text-xl font-bold text-slate-300 hover:text-white uppercase tracking-widest">
                🧠 The Mastermind
            </button>
        </div>

        <div id="dashboard" class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Content generated by JS -->
        </div>

        <footer class="mt-20 text-center text-slate-500 text-sm">
            <p>Powered by Mr. Numbers & Finley | Galactic Edition 2026</p>
        </footer>
    </div>

    <script>
        const data = {
            "students": {
                "Emelia": {
                    "color": "#ff69b4",
                    "icon": "👑",
                    "quests": [
                        {
                            "name": "The Quest for the Golden Calculator",
                            "date": "2026-04-15",
                            "score": "100%",
                            "correct": 7,
                            "total": 7,
                            "titles": ["The Golden Calculator Guardian"],
                            "challenges": ["The Summation Summit", "The Fractional Falls", "The Geometry Gorge", "The Time-Warp Tunnels", "The Currency Canyon", "The Logic Labyrinth", "The Golden Calculator's Core"]
                        },
                        {
                            "name": "The Galactic Math Odyssey",
                            "date": "2026-04-18",
                            "score": "100%",
                            "correct": 7,
                            "total": 7,
                            "titles": ["The Galactic GRANDMASTER of Mathematics"],
                            "challenges": [
                               "Rocket Fuel Refill",
                               "Stellar Shard Sorting",
                               "Asteroid Belt Budget",
                               "Omega Station Outpost",
                               "Light-Year Leap",
                               "Moon-Dust Market",
                               "The Cosmic Riddle"
                            ]
                        },
                        {
                            "name": "The Shattered Prism Nebula",
                            "date": "2026-04-20",
                            "score": "100%",
                            "correct": 7,
                            "total": 7,
                            "titles": ["The Prism Nebula Conqueror"],
                            "challenges": [
                                "The Void-Core Calculation",
                                "Prism Shard Precision",
                                "The Comet-Tail Toll",
                                "The Dyson Ring Perimeter",
                                "The Chrono-Shift Paradox",
                                "Nebula Battery Balance",
                                "The Super-Brain Cosmic Riddle"
                            ]
                        },
                        {
                            "name": "The Clockwork Citadel of Calculation",
                            "date": "2026-04-22",
                            "score": "100%",
                            "correct": 4,
                            "total": 4,
                            "titles": ["The Master Clock-Winder of the Cosmos"],
                            "challenges": ["The Gear-Grinder's Gate", "The Hall of Infinite Fractions", "The Ruby Bonus", "The Vault of Vanishing Variables", "The Chronos Sphinx's Final Riddle"]
                        }
                    ]
                },
                "Noah": {
                    "color": "#4caf50",
                    "icon": "🦖",
                    "quests": [
                        {
                            "name": "The Great Dino-Discovery Adventure",
                            "date": "2026-04-19",
                            "score": "100%",
                            "correct": 7,
                            "total": 7,
                            "titles": ["The Prehistoric Prime Professor"],
                            "challenges": [
                               "The Egg Hunt",
                               "Feeding the T-Rex",
                                "Stegosaurus Scales",
                                "The Dino-Gift Shop",
                                "The Big Dino-Nap",
                               "Pterodactyl Perches",
                               "The Super-Brain Junior Riddle"
                            ]
                        }
                    ]
                }
            },
            "adults": {
                "Toan": {
                    "color": "#3b82f6",
                    "icon": "🧠",
                    "quests": []
                }
            }
        };

        function switchTab(type) {
            document.getElementById('btn-kids').classList.toggle('active', type === 'kids');
            document.getElementById('btn-adults').classList.toggle('active', type === 'adults');
            renderDashboard(type);
        }

        function renderDashboard(type) {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';
            
            const group = type === 'kids' ? data.students : data.adults;

            for (const [name, info] of Object.entries(group)) {
                let glowClass = '';
                if (name === 'Emelia') glowClass = 'glow-pink';
                else if (name === 'Noah') glowClass = 'glow-green';
                else glowClass = 'glow-blue';
                
                let questHtml = '';
                if (info.quests.length === 0) {
                    questHtml = `
                        <div class="p-6 rounded-xl bg-slate-800/30 border border-dashed border-slate-600 text-center text-slate-500">
                            No quests completed yet. Time to start the challenge! 🚀
                        </div>
                    `;
                } else {
                    info.quests.forEach(q => {
                        questHtml += `
                            <div class="mb-6 p-4 rounded-xl bg-slate-800/50 border border-slate-700">
                                <div class="flex justify-between items-center mb-2">
                                    <h3 class="text-lg text-white">${q.name}</h3>
                                    <span class="px-3 py-1 rounded-full text-xs font-bold bg-white/10 text-slate-300">${q.date}</span>
                                </div>
                                ${q.titles ? `<div class="flex flex-wrap gap-2 mb-3">
                                    ${q.titles.map(t => `<span class="px-2 py-0.5 rounded-full text-[10px] font-black uppercase tracking-tighter bg-yellow-400 text-black shadow-sm">${t}</span>`).join('')}
                                </div>` : ''}
                                <div class="flex items-center gap-4 mb-3">
                                    <div class="flex-1 h-4 bg-slate-700 rounded-full overflow-hidden">
                                        <div class="h-full" style="width: ${q.score}; background-color: ${info.color}"></div>
                                    </div>
                                    <span class="font-bold" style="color: ${info.color}">${q.score}</span>
                                </div>
                                <div class="text-xs text-slate-400 flex flex-wrap gap-2">
                                    ${q.challenges.map(c => `<span class="bg-slate-900 px-2 py-1 rounded border border-slate-700">${c}</span>`).join('')}
                                </div>
                            </div>
                        `;
                    });
                }

                dashboard.innerHTML += `
                    <div class="card ${glowClass} rounded-3xl p-8 relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 text-6xl opacity-20">${info.icon}</div>
                        
                        <div class="flex items-center gap-4 mb-8">
                            <div class="w-16 h-16 rounded-full flex items-center justify-center text-3xl shadow-lg" style="background-color: ${info.color}">
                                ${info.icon}
                            </div>
                            <div>
                                <h2 class="text-4xl text-white">${name}</h2>
                                <p class="text-slate-400 font-medium uppercase tracking-widest text-sm">${type === 'kids' ? 'Math Legend' : 'Mastermind'}</p>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <h3 class="text-xl text-slate-300 mb-4 flex items-center gap-2">
                                <span>🏆</span> Completed Quests
                            </h3>
                            ${questHtml}
                        </div>
                    </div>
                `;
            }
        }

        // Initial render
        renderDashboard('kids');
    </script>
</body>
</html>
