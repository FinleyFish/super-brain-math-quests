<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 The Grand Archive of the Super-Brain Universe</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;700&family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c1d;
            --card-bg: #16163a;
            --text-color: #e0e0ff;
            --accent-color: #7b61ff;
            --highlight-color: #ffcc00;
            --border-color: #2d2d5f;
            --junior-primary: #4ade80;
            --junior-bg: #064e3b;
            --master-primary: #f472b6;
            --master-bg: #500724;
            --task-color: #00f2ff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        #page-container {
            max-width: 1000px;
            width: 95%;
            margin: 40px auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-family: 'Luckiest Guy', cursive, system-ui;
            font-size: 4rem;
            color: var(--highlight-color);
            text-shadow: 5px 5px 0px #4b3d8a;
            margin: 0;
        }
        .subtitle {
            font-family: 'Space Grotesk', sans-serif, system-ui;
            font-size: 1.3rem;
            color: #aaa;
            margin-top: 10px;
        }
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .tab-btn {
            padding: 15px 30px;
            font-family: 'Space Grotesk', sans-serif, system-ui;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            border: 3px solid var(--border-color);
            border-radius: 15px;
            background: var(--card-bg);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        .tab-btn.active-junior {
            background: var(--junior-bg);
            border-color: var(--junior-primary);
            color: white;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
            transform: scale(1.05);
        }
        .tab-btn.active-master {
            background: var(--master-bg);
            border-color: var(--master-primary);
            color: white;
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.3);
            transform: scale(1.05);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .quest-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        .quest-card {
            background: var(--card-bg);
            border: 3px solid var(--border-color);
            border-radius: 25px;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .quest-card:hover { transform: translateY(-5px); }
        .quest-card.junior { border-color: var(--junior-primary); }
        .quest-card.master { border-color: var(--master-primary); }
        .quest-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-bottom: 3px solid var(--border-color);
            display: block;
            background-color: #1a1a3a;
        }
        .quest-body { padding: 30px; flex-grow: 1; }
        .quest-title {
            font-family: 'Space Grotesk', sans-serif, system-ui;
            font-size: 1.8rem;
            color: var(--highlight-color);
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            line-height: 1.2;
        }
        .vibe-tag {
            font-size: 0.8rem;
            background: var(--accent-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .quest-text {
            font-size: 1.1rem;
            color: var(--text-color);
        }
        .quest-text strong {
            color: var(--highlight-color);
            font-weight: 700;
        }

        /* --- VISUAL SEPARATOR --- */
        .quest-divider {
            height: 2px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
            margin: 40px 0;
            position: relative;
            display: block;
        }
        .quest-divider::after {
            content: '✦';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 0 15px;
            color: var(--accent-color);
            font-size: 1.2rem;
        }

        /* --- THE ULTIMATE TASK FIX --- */
        .task-block {
            display: block;
            clear: both;
            margin: 30px 0;
            padding: 25px;
            background: rgba(0, 0, 0, 0.6);
            border-left: 8px solid var(--task-color);
            border-radius: 0 20px 20px 0;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.15);
            position: relative;
        }
        .task-block strong {
            color: var(--task-color) !important;
            display: block;
            font-family: 'Space Grotesk', sans-serif, system-ui;
            font-size: 1.4rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }
        .task-block-content {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #fff;
        }
        
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #777;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="page-container">
        <header>
            <h1>🌟 SUPER-BRAIN ARCHIVES 🌟</h1>
            <div class="subtitle">Epic Math Quests for Brave Minds</div>
        </header>
        <div class="tab-nav">
            <div id="btn-junior" class="tab-btn" onclick="switchTab('junior')">🦖 Junior Explorer [5-7]</div>
            <div id="btn-master" class="tab-btn" onclick="switchTab('master')">👑 Master Navigator [8-11]</div>
        </div>
        <div id="tab-junior" class="tab-content"><div class="quest-grid" id="grid-junior"></div></div>
        <div id="tab-master" class="tab-content"><div class="quest-grid" id="grid-master"></div></div>
        <div class="footer">Compiled by Finley & Mr. Numbers | Galactic Edition 2026</div>
    </div>

    <script>
        // --- IMAGE CONFIGURATION ---
        const IMAGE_BASE_URL = "https://raw.githubusercontent.com/FinleyFish/super-brain-math-quests/main/assets/images/";
        
        const IMAGE_MAP = {
            "Numeria": { file: "numeria.jpg", fallback: "https://images.unsplash.com/photo-1518709268805-4d5362d6ed3a?auto=format&fit=crop&w=800&q=80" },
            "Galactic": { file: "galactic.jpg", fallback: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80" },
            "Prism": { file: "prism.jpg", fallback: "https://images.unsplash.com/photo-1550684376-ef03f53c8dec?auto=format&fit=crop&w=800&q=80" },
            "Clockwork": { file: "clockwork.jpg", fallback: "https://images.unsplash.com/photo-1534447677768-6d777573995b?auto=format&fit=crop&w=800&q=80" },
            "Crystal": { file: "crystal.jpg", fallback: "https://images.unsplash.com/photo-1516339901601-515d77669998?auto=format&fit=crop&w=800&q=80" },
            "Dino": { file: "dino.jpg", fallback: "https://images.unsplash.com/photo-1559967553-774571437848?auto=format&fit=crop&w=800&q=80" }
        };

        async function init() {
            try {
                const response = await fetch('SuperBrain_MathQuests_Archive.md');
                if (!response.ok) throw new Error('Archive file not found');
                const text = await response.text();
                
                const splitIdx = text.indexOf('## 🦖');
                if (splitIdx === -1) throw new Error('Could not find Junior section in archive');
                
                const masterSection = text.substring(0, splitIdx);
                const juniorSection = text.substring(splitIdx);

                document.getElementById('grid-master').innerHTML = renderQuests(masterSection, 'master');
                document.getElementById('grid-junior').innerHTML = renderQuests(juniorSection, 'junior');
                switchTab('master');
            } catch (e) {
                console.error(e);
                document.getElementById('grid-master').innerHTML = `<p style="color:red">Error loading quests: ${e.message}</p>`;
            }
        }

        function renderQuests(sectionText, type) {
            const questMatches = sectionText.split(/\n(?=### )/);
            let html = "";

            questMatches.forEach(q => {
                if (!q.trim().startsWith('###')) return;

                const lines = q.split('\n');
                const title = lines[0].replace('### ', '').trim();
                
                let imgUrl = "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80";
                for (const key in IMAGE_MAP) {
                    if (title.toLowerCase().includes(key.toLowerCase())) {
                        imgUrl = IMAGE_BASE_URL + IMAGE_MAP[key].file;
                        break;
                    }
                }
                let fallbackUrl = "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80";
                for (const key in IMAGE_MAP) {
                    if (title.toLowerCase().includes(key.toLowerCase())) {
                        fallbackUrl = IMAGE_MAP[key].fallback;
                        break;
                    }
                }

                const vibeMatch = q.match(/\*\*The Vibe:\*\*\s*(.*?)\n/);
                const vibe = vibeMatch ? vibeMatch[1] : "Adventure";

                let bodyRaw = lines.slice(1).join('\n');
                bodyRaw = bodyRaw.replace(/^---$/gm, '<div class="quest-divider"></div>');
                let bodyHtml = marked.parse(bodyRaw);
                
                const pRegex = /<p>(.*?)<strong\s*[^>]*>(THE TASK:|TASK \d+:)\s*<\/strong>(.*?)<\/p>/gi;
                bodyHtml = bodyHtml.replace(pRegex, (match, before, label, after) => {
                    let prefix = before.trim() ? `<p>${before}</p>` : "";
                    return `${prefix}<div class="task-block"><strong>${label}</strong><div class="task-block-content">${after}</div></div>`;
                });

                html += `
                    <div class="quest-card ${type}">
                        <img src="${imgUrl}" 
                             onerror="this.src='${fallbackUrl}'" 
                             class="quest-img" 
                             alt="${title}">
                        <div class="quest-body">
                            <h3 class="quest-title">${title} <span class="vibe-tag">${vibe}</span></h3>
                            <div class="quest-text">${bodyHtml}</div>
                        </div>
                    </div>
                `;
            });
            return html;
        }

        function switchTab(type) {
            document.getElementById('tab-junior').classList.remove('active');
            document.getElementById('tab-master').classList.remove('active');
            document.getElementById('btn-junior').classList.remove('active-junior');
            document.getElementById('btn-master').classList.remove('active-master');

            if (type === 'junior') {
                document.getElementById('tab-junior').classList.add('active');
                document.getElementById('btn-junior').classList.add('active-junior');
            } else {
                document.getElementById('tab-master').classList.add('active');
                document.getElementById('btn-master').classList.add('active-master');
            }
        }

        init();
    </script>
</body>
</html>
