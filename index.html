<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 The Grand Archive of the Super-Brain Universe</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c1d;
            --card-bg: #16163a;
            --text-color: #e0e0ff;
            --accent-color: #7b61ff;
            --highlight-color: #ffcc00;
            --border-color: #2d2d5f;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        #content-wrapper {
            max-width: 850px;
            width: 90%;
            margin: 40px 0;
            padding: 40px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            border-bottom: 4px solid var(--accent-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
            color: var(--highlight-color);
        }
        h2 {
            border-left: 8px solid var(--accent-color);
            padding-left: 15px;
            margin-top: 50px;
            font-size: 1.8rem;
        }
        h3 {
            margin-top: 30px;
            font-size: 1.4rem;
            color: var(--text-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }
        p, li {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        strong {
            color: var(--highlight-color);
        }
        hr {
            border: 0;
            height: 1px;
            background: var(--border-color);
            margin: 40px 0;
        }
        .quest-card {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }
        .footer {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 40px;
            color: #777;
            font-style: italic;
        }
        /* Markdown specific styles */
        .markdown-body h4 {
            color: var(--accent-color);
            margin-top: 20px;
            font-size: 1.2rem;
        }
        .markdown-body blockquote {
            border-left: 4px solid var(--highlight-color);
            padding-left: 20px;
            font-style: italic;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div id="content-wrapper" class="markdown-body">
        <div id="content">Loading the archives... 🚀</div>
        <div class="footer">Compiled by Finley & Mr. Numbers | Galactic Edition 2026</div>
    </div>

    <script>
        async function loadQuests() {
            try {
                const response = await fetch('SuperBrain_MathQuests_Archive.md');
                if (!response.ok) throw new Error('Could not load the archive');
                const text = await response.text();
                document.getElementById('content').innerHTML = marked.parse(text);
            } catch (err) {
                document.getElementById('content').innerHTML = '<p style="color:red">Error loading archives: ' + err.message + '</p>';
            }
        }
        loadQuests();
    </script>
</body>
</html>
